name: Build RP2040 Zero Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v1
        with:
          version: 0.32.3

      - name: Configure Arduino CLI and update board index
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
          arduino-cli core update-index

      # Removed manual download step; arduino-cli handles core installation

      - name: Install rp2040 platform (EarlePhilhower)
        run: |
          arduino-cli core install earlephilhower:rp2040 || (echo "Core install failed" && arduino-cli core list && arduino-cli config dump)
      - name: List installed cores
        run: |
          arduino-cli core list
      - name: Show Arduino CLI config
        run: |
          arduino-cli config dump

      - name: Build allhardwaretest.ino
        run: |
          arduino-cli compile --fqbn earlephilhower:rp2040:waveshare_rp2040_zero --output-dir="hardware tests/ino/build" "hardware tests/ino/allhardwaretest"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: rp2040zero-firmware
          path: "hardware tests/ino/build/*.uf2"
